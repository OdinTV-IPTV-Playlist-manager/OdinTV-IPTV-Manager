<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Playlist Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d9ff; }
        h2 { color: #00d9ff; margin: 15px 0 10px; font-size: 1.2em; }
        
        .playlist-selector { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .playlist-selector select { padding: 8px 12px; background: #16213e; color: #eee; border: 1px solid #0f3460; border-radius: 4px; cursor: pointer; }
        .playlist-selector button { padding: 8px 16px; background: #0f3460; color: #eee; border: none; border-radius: 4px; cursor: pointer; }
        .playlist-selector button:hover { background: #1a4a7a; }
        
        .upload-section, .existing-playlists { background: #16213e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .upload-section textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; background: #0f3460; color: #eee; border: 1px solid #1a4a7a; border-radius: 4px; resize: vertical; }
        .upload-section input[type="file"] { margin: 10px 0; }
        .upload-section button, .existing-playlists button { padding: 8px 16px; background: #0f3460; color: #eee; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .upload-section button:hover, .existing-playlists button:hover { background: #1a4a7a; }
        
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filters select, .filters input { padding: 8px 12px; background: #16213e; color: #eee; border: 1px solid #0f3460; border-radius: 4px; }
        .filters input { flex: 1; min-width: 200px; }
        
        .channel-list { background: #16213e; border-radius: 8px; overflow: hidden; }
        .channel-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #0f3460; gap: 10px; flex-wrap: wrap; }
        .channel-item:last-child { border-bottom: none; }
        .channel-item:hover { background: #1a2744; }
        .channel-info { flex: 1; min-width: 200px; }
        .channel-name { font-weight: bold; color: #00d9ff; }
        .channel-group { font-size: 0.85em; color: #888; }
        .channel-url { font-size: 0.8em; color: #666; word-break: break-all; }
        
        .btn-row { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; transition: all 0.2s; }
        .btn-play { background: #28a745; color: white; }
        .btn-play:hover { background: #34ce57; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-edit:hover { background: #ffca2c; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #e4606d; }
        .btn-check { background: #17a2b8; color: white; }
        .btn-check:hover { background: #19b4cc; }
        .btn-bad { background: #6c757d; color: white; }
        .btn-bad:hover { background: #7b868f; }
        .btn-good { background: #28a745; color: white; }
        .btn-good:hover { background: #34ce57; }
        .btn-work { background: #fd7e14; color: white; }
        .btn-work:hover { background: #ff953a; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal.show { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: #16213e; padding: 25px; border-radius: 8px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; color: #aaa; }
        .close:hover { color: #fff; }
        .modal-content h2 { margin-top: 0; }
        .modal-content form label { display: block; margin: 12px 0; }
        .modal-content form input, .modal-content form select, .modal-content form textarea { width: 100%; padding: 8px; margin-top: 5px; background: #0f3460; color: #eee; border: 1px solid #1a4a7a; border-radius: 4px; }
        .modal-content form textarea { resize: vertical; min-height: 60px; }
        .modal-content form button { padding: 10px 20px; background: #00d9ff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .modal-content form button:hover { background: #00b8d9; }
        
        #videoModal .modal-content { max-width: 900px; }
        #videoContainer { width: 100%; aspect-ratio: 16/9; background: #000; margin: 15px 0; }
        video { width: 100%; height: 100%; }
        
        .playlist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #0f3460; gap: 10px; flex-wrap: wrap; }
        .playlist-item:last-child { border-bottom: none; }
        .playlist-name { font-weight: bold; color: #00d9ff; }
        .playlist-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .playlist-link { color: #00d9ff; text-decoration: none; font-size: 0.85em; }
        .playlist-link:hover { text-decoration: underline; }
        .btn-copy { background: #6f42c1; color: white; padding: 4px 10px; font-size: 0.8em; }
        .btn-copy:hover { background: #8555c9; }
        .btn-download { background: #20c997; color: white; padding: 4px 10px; font-size: 0.8em; }
        .btn-download:hover { background: #28d5a3; }
        .btn-delete-pl { background: #dc3545; color: white; padding: 4px 10px; font-size: 0.8em; }
        .btn-delete-pl:hover { background: #e4606d; }
        
        .stats { margin: 10px 0; font-size: 0.9em; color: #888; }
        
        @media (max-width: 768px) {
            .channel-item { flex-direction: column; align-items: flex-start; }
            .btn-row { width: 100%; justify-content: flex-start; }
            .playlist-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 IPTV Playlist Manager</h1>
        
        <div class="playlist-selector">
            <label>Текущий плейлист:</label>
            <select id="currentPlaylist" onchange="switchPlaylist()"></select>
            <button onclick="showCreatePlaylistModal()">➕ Создать плейлист</button>
        </div>
        
        <div class="upload-section">
            <h2>📤 Загрузить плейлист</h2>
            <div>
                <label>В целевой плейлист:</label>
                <select id="uploadTarget"></select>
            </div>
            <input type="file" id="fileInput" accept=".m3u,.m3u8" onchange="uploadFile()">
            <button onclick="document.getElementById('fileInput').click()">Выбрать файл</button>
            <p style="margin: 10px 0;">или вставьте содержимое:</p>
            <textarea id="playlistContent" placeholder="#EXTM3U&#10;#EXTINF:-1 group-title=&quot;News&quot;,Channel Name&#10;http://example.com/stream.m3u8"></textarea>
            <button onclick="uploadContent()">Загрузить текст</button>
            <button onclick="copyFromCurrent()">Копировать из текущего</button>
            <button onclick="mergeToCurrent()">Объединить с текущим</button>
        </div>
        
        <div class="existing-playlists">
            <h2>📁 Существующие плейлисты</h2>
            <div id="playlistsList"></div>
        </div>
        
        <div class="filters">
            <label>Группа:</label>
            <select id="filterGroup" onchange="applyFilters()">
                <option value="">Все группы</option>
            </select>
            <input type="text" id="filterSearch" placeholder="Поиск по названию..." oninput="applyFilters()">
            <span class="stats" id="stats"></span>
        </div>
        
        <div class="channel-list" id="channelList"></div>
    </div>
    
    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideoModal()">&times;</span>
            <h2>▶️ Воспроизведение</h2>
            <div id="videoContainer"><video id="videoPlayer" controls></video></div>
            <div id="videoInfo"></div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>✏️ Редактировать канал</h2>
            <form onsubmit="saveChannel(event)">
                <input type="hidden" id="editIndex">
                <label>Название:
                    <input type="text" id="editName" required>
                </label>
                <label>Группа:
                    <input type="text" id="editGroup">
                </label>
                <label>TVG ID:
                    <input type="text" id="editTvgId">
                </label>
                <label>TVG Name:
                    <input type="text" id="editTvgName">
                </label>
                <label>Логотип:
                    <input type="text" id="editLogo">
                </label>
                <label>TVG Rec:
                    <input type="text" id="editTvgRec">
                </label>
                <label>Catchup:
                    <input type="text" id="editCatchup">
                </label>
                <label>Catchup Days:
                    <input type="text" id="editCatchupDays">
                </label>
                <label>Catchup Source:
                    <input type="text" id="editCatchupSource">
                </label>
                <label>Audio Track:
                    <input type="text" id="editAudioTrack">
                </label>
                <label>User Agent:
                    <input type="text" id="editUseragent">
                </label>
                <label>Дополнительные EXTVLCOPT (каждая строка отдельно):
                    <textarea id="editExtvlcopt"></textarea>
                </label>
                <button type="submit">💾 Сохранить</button>
            </form>
        </div>
    </div>
    
    <!-- Create Playlist Modal -->
    <div id="createPlaylistModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreatePlaylistModal()">&times;</span>
            <h2>➕ Создать новый плейлист</h2>
            <form onsubmit="createPlaylist(event)">
                <label>Название плейлиста:
                    <input type="text" id="newPlaylistName" required placeholder="Например: MyPlaylist.m3u8">
                </label>
                <button type="submit">Создать</button>
            </form>
        </div>
    </div>

    <script>
        // Инициализация хранилища
        const STORAGE_KEY = 'iptv_playlists';
        let playlists = {};
        let currentPlaylistName = 'MainList.m3u8';
        let filteredChannels = [];
        let allChannels = [];

        function loadPlaylists() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                playlists = JSON.parse(stored);
            } else {
                playlists = { 'MainList.m3u8': '#EXTM3U\n' };
                savePlaylists();
            }
            
            const savedCurrent = localStorage.getItem('iptv_current_playlist');
            if (savedCurrent && playlists[savedCurrent]) {
                currentPlaylistName = savedCurrent;
            }
        }

        function savePlaylists() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(playlists));
        }

        function parseM3U(content) {
            const channels = [];
            const lines = content.split('\n');
            let currentChannel = null;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {
                        extinf: line,
                        name: '',
                        group: '',
                        logo: '',
                        tvg_id: '',
                        tvg_name: '',
                        tvg_rec: '',
                        catchup: '',
                        catchup_days: '',
                        catchup_source: '',
                        audio_track: '',
                        useragent: '',
                        url: '',
                        extvlcopt: []
                    };

                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    currentChannel.group = groupMatch ? groupMatch[1] : '';

                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : '';

                    const tvgIdMatch = line.match(/tvg-id="([^"]*)"/);
                    currentChannel.tvg_id = tvgIdMatch ? tvgIdMatch[1] : '';

                    const tvgNameMatch = line.match(/tvg-name="([^"]*)"/);
                    currentChannel.tvg_name = tvgNameMatch ? tvgNameMatch[1] : '';

                    const tvgRecMatch = line.match(/tvg-rec="([^"]*)"/);
                    currentChannel.tvg_rec = tvgRecMatch ? tvgRecMatch[1] : '';

                    const catchupMatch = line.match(/catchup="([^"]*)"/);
                    currentChannel.catchup = catchupMatch ? catchupMatch[1] : '';

                    const catchupDaysMatch = line.match(/catchup-days="([^"]*)"/);
                    currentChannel.catchup_days = catchupDaysMatch ? catchupDaysMatch[1] : '';

                    const catchupSourceMatch = line.match(/catchup-source="([^"]*)"/);
                    currentChannel.catchup_source = catchupSourceMatch ? catchupSourceMatch[1] : '';

                    const audioTrackMatch = line.match(/audio-track="([^"]*)"/);
                    currentChannel.audio_track = audioTrackMatch ? audioTrackMatch[1] : '';

                    const nameParts = line.split(',');
                    currentChannel.name = nameParts[nameParts.length - 1].trim();

                } else if (line.startsWith('#EXTVLCOPT:')) {
                    if (currentChannel !== null) {
                        const uaMatch = line.match(/#EXTVLCOPT:\s*user-agent=(.+)/i);
                        if (uaMatch) {
                            currentChannel.useragent = uaMatch[1].trim();
                        } else {
                            currentChannel.extvlcopt.push(line);
                        }
                    }
                } else if (line.match(/^(http|rtmp|udp|rtp):/)) {
                    if (currentChannel !== null) {
                        currentChannel.url = line;
                        channels.push(currentChannel);
                        currentChannel = null;
                    }
                }
            }

            return channels;
        }

        function generateM3U(channels) {
            let content = '#EXTM3U\n';
            for (const channel of channels) {
                let extinf = '#EXTINF:-1';

                if (channel.tvg_id) extinf += ' tvg-id="' + channel.tvg_id + '"';
                if (channel.tvg_name) extinf += ' tvg-name="' + channel.tvg_name + '"';
                if (channel.group) extinf += ' group-title="' + channel.group + '"';
                if (channel.logo) extinf += ' tvg-logo="' + channel.logo + '"';
                if (channel.tvg_rec) extinf += ' tvg-rec="' + channel.tvg_rec + '"';
                if (channel.catchup) extinf += ' catchup="' + channel.catchup + '"';
                if (channel.catchup_days) extinf += ' catchup-days="' + channel.catchup_days + '"';
                if (channel.catchup_source) extinf += ' catchup-source="' + channel.catchup_source + '"';
                if (channel.audio_track) extinf += ' audio-track="' + channel.audio_track + '"';

                extinf += ', ' + channel.name;

                content += extinf + '\n';

                if (channel.useragent) {
                    content += '#EXTVLCOPT:user-agent=' + channel.useragent + '\n';
                }

                for (const opt of (channel.extvlcopt || [])) {
                    content += opt + '\n';
                }

                content += channel.url + '\n';
            }
            return content;
        }

        function sortChannels(channels) {
            return channels.sort((a, b) => {
                const groupCompare = a.group.localeCompare(b.group);
                if (groupCompare !== 0) return groupCompare;
                return a.name.localeCompare(b.name);
            });
        }

        function getCurrentContent() {
            return playlists[currentPlaylistName] || '#EXTM3U\n';
        }

        function setCurrentContent(content) {
            playlists[currentPlaylistName] = content;
            savePlaylists();
        }

        function updatePlaylistSelector() {
            const select = document.getElementById('currentPlaylist');
            const uploadSelect = document.getElementById('uploadTarget');
            const names = Object.keys(playlists).sort();
            
            select.innerHTML = '';
            uploadSelect.innerHTML = '';
            
            for (const name of names) {
                const opt1 = document.createElement('option');
                opt1.value = name;
                opt1.textContent = name;
                if (name === currentPlaylistName) opt1.selected = true;
                select.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = name;
                opt2.textContent = name;
                if (name === currentPlaylistName) opt2.selected = true;
                uploadSelect.appendChild(opt2);
            }
        }

        function switchPlaylist() {
            const select = document.getElementById('currentPlaylist');
            currentPlaylistName = select.value;
            localStorage.setItem('iptv_current_playlist', currentPlaylistName);
            renderChannels();
            updatePlaylistsList();
        }

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const targetSelect = document.getElementById('uploadTarget');
            const target = targetSelect.value;

            if (fileInput.files.length === 0) {
                alert('Выберите файл!');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                let content = e.target.result;
                if (!content.includes('#EXTM3U')) {
                    content = '#EXTM3U\n' + content;
                }
                playlists[target] = content;
                savePlaylists();
                
                if (target === currentPlaylistName) {
                    renderChannels();
                }
                updatePlaylistSelector();
                updatePlaylistsList();
                fileInput.value = '';
                alert('Плейлист загружен!');
            };

            reader.readAsText(file);
        }

        function uploadContent() {
            const content = document.getElementById('playlistContent').value;
            const targetSelect = document.getElementById('uploadTarget');
            const target = targetSelect.value;

            if (!content.trim()) {
                alert('Введите содержимое плейлиста!');
                return;
            }

            let finalContent = content;
            if (!finalContent.includes('#EXTM3U')) {
                finalContent = '#EXTM3U\n' + finalContent;
            }

            playlists[target] = finalContent;
            savePlaylists();

            if (target === currentPlaylistName) {
                renderChannels();
            }
            updatePlaylistSelector();
            updatePlaylistsList();
            document.getElementById('playlistContent').value = '';
            alert('Плейлист загружен!');
        }

        function copyFromCurrent() {
            const content = getCurrentContent();
            document.getElementById('playlistContent').value = content;
        }

        function mergeToCurrent() {
            const content = document.getElementById('playlistContent').value;
            if (!content.trim()) {
                alert('Введите содержимое плейлиста!');
                return;
            }

            const newChannels = parseM3U(content);
            const currentChannels = parseM3U(getCurrentContent());
            const merged = [...currentChannels, ...newChannels];
            
            setCurrentContent(generateM3U(merged));
            renderChannels();
            document.getElementById('playlistContent').value = '';
            alert('Каналы добавлены в текущий плейлист!');
        }

        function createPlaylist(event) {
            event.preventDefault();
            const nameInput = document.getElementById('newPlaylistName');
            let name = nameInput.value.trim();

            if (!name) {
                alert('Введите название плейлиста!');
                return;
            }

            if (!name.toLowerCase().endsWith('.m3u') && !name.toLowerCase().endsWith('.m3u8')) {
                name += '.m3u8';
            }

            if (playlists[name]) {
                alert('Плейлист с таким названием уже существует!');
                return;
            }

            playlists[name] = '#EXTM3U\n';
            savePlaylists();
            currentPlaylistName = name;
            localStorage.setItem('iptv_current_playlist', currentPlaylistName);
            
            nameInput.value = '';
            closeCreatePlaylistModal();
            updatePlaylistSelector();
            updatePlaylistsList();
            renderChannels();
        }

        function deletePlaylist(name) {
            if (name === 'MainList.m3u8') {
                alert('Нельзя удалить основной плейлист MainList.m3u8!');
                return;
            }

            if (!confirm('Удалить плейлист "' + name + '"?')) return;

            delete playlists[name];
            savePlaylists();

            if (currentPlaylistName === name) {
                currentPlaylistName = 'MainList.m3u8';
                localStorage.setItem('iptv_current_playlist', currentPlaylistName);
            }

            updatePlaylistSelector();
            updatePlaylistsList();
            renderChannels();
        }

        function downloadPlaylist(name) {
            const content = playlists[name] || '#EXTM3U\n';
            const blob = new Blob([content], { type: 'application/x-mpegURL' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function copyPlaylistLink(name) {
            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            const link = baseUrl + 'playlists/' + encodeURIComponent(name);
            
            navigator.clipboard.writeText(link).then(() => {
                alert('Ссылка скопирована: ' + link);
            }).catch(err => {
                console.error('Ошибка копирования:', err);
                
                const textarea = document.createElement('textarea');
                textarea.value = link;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Ссылка скопирована: ' + link);
            });
        }

        function updatePlaylistsList() {
            const container = document.getElementById('playlistsList');
            const names = Object.keys(playlists).sort();

            container.innerHTML = '';

            for (const name of names) {
                const channels = parseM3U(playlists[name]);
                const div = document.createElement('div');
                div.className = 'playlist-item';
                div.innerHTML = `
                    <span class="playlist-name">${escapeHtml(name)} (${channels.length} каналов)</span>
                    <div class="playlist-actions">
                        <a href="#" class="playlist-link" onclick="downloadPlaylist('${escapeJs(name)}'); return false;">⬇️ Скачать</a>
                        <button class="btn btn-copy" onclick="copyPlaylistLink('${escapeJs(name)}')">📋 Копировать ссылку</button>
                        ${name !== 'MainList.m3u8' ? `<button class="btn btn-delete-pl" onclick="deletePlaylist('${escapeJs(name)}')">🗑️ Удалить</button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeJs(text) {
            return text.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function applyFilters() {
            const groupFilter = document.getElementById('filterGroup').value;
            const searchFilter = document.getElementById('filterSearch').value.toLowerCase();

            filteredChannels = allChannels.filter(channel => {
                if (groupFilter && channel.group !== groupFilter) return false;
                if (searchFilter && !channel.name.toLowerCase().includes(searchFilter)) return false;
                return true;
            });

            renderChannelList();
        }

        function renderChannels() {
            allChannels = parseM3U(getCurrentContent());
            
            const groups = [...new Set(allChannels.map(c => c.group))].filter(g => g).sort();
            const groupSelect = document.getElementById('filterGroup');
            const currentGroup = document.getElementById('filterGroup').value;
            
            groupSelect.innerHTML = '<option value="">Все группы</option>';
            for (const group of groups) {
                const opt = document.createElement('option');
                opt.value = group;
                opt.textContent = group;
                if (group === currentGroup) opt.selected = true;
                groupSelect.appendChild(opt);
            }

            document.getElementById('stats').textContent = `Всего: ${allChannels.length}`;
            applyFilters();
        }

        function renderChannelList() {
            const container = document.getElementById('channelList');
            container.innerHTML = '';

            if (filteredChannels.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">Нет каналов для отображения</div>';
                return;
            }

            document.getElementById('stats').textContent = `Показано: ${filteredChannels.length} из ${allChannels.length}`;

            for (let i = 0; i < filteredChannels.length; i++) {
                const channel = filteredChannels[i];
                const originalIndex = allChannels.indexOf(channel);
                
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `
                    <div class="channel-info">
                        <div class="channel-name">${escapeHtml(channel.name)}</div>
                        <div class="channel-group">${escapeHtml(channel.group || 'Без группы')}</div>
                        <div class="channel-url">${escapeHtml(channel.url)}</div>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-play" onclick="playChannel(${originalIndex})">▶️ Смотреть</button>
                        <button class="btn btn-edit" onclick="openEditModal(${originalIndex})">✏️ Редактировать</button>
                        <button class="btn btn-delete" onclick="deleteChannel(${originalIndex})">🗑️ Удалить</button>
                        <button class="btn btn-check" onclick="moveChannel(${originalIndex}, 'check.m3u')">CHECK</button>
                        <button class="btn btn-bad" onclick="moveChannel(${originalIndex}, 'bad.m3u')">BAD</button>
                        <button class="btn btn-good" onclick="moveChannel(${originalIndex}, 'good.m3u')">GOOD</button>
                        <button class="btn btn-work" onclick="moveChannel(${originalIndex}, 'work.m3u')">WORK</button>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function playChannel(index) {
            const channel = allChannels[index];
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            const info = document.getElementById('videoInfo');

            info.innerHTML = `<strong>${escapeHtml(channel.name)}</strong><br>${escapeHtml(channel.url)}`;
            modal.classList.add('show');

            if (Hls.isSupported() && (channel.url.includes('.m3u8') || channel.url.includes('.m3u'))) {
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Autoplay prevented:', e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.play().catch(e => console.log('Autoplay prevented:', e));
            } else {
                video.src = channel.url;
                video.play().catch(e => console.log('Autoplay prevented:', e));
            }
        }

        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            video.pause();
            video.src = '';
            modal.classList.remove('show');
        }

        function openEditModal(index) {
            const channel = allChannels[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('editName').value = channel.name || '';
            document.getElementById('editGroup').value = channel.group || '';
            document.getElementById('editTvgId').value = channel.tvg_id || '';
            document.getElementById('editTvgName').value = channel.tvg_name || '';
            document.getElementById('editLogo').value = channel.logo || '';
            document.getElementById('editTvgRec').value = channel.tvg_rec || '';
            document.getElementById('editCatchup').value = channel.catchup || '';
            document.getElementById('editCatchupDays').value = channel.catchup_days || '';
            document.getElementById('editCatchupSource').value = channel.catchup_source || '';
            document.getElementById('editAudioTrack').value = channel.audio_track || '';
            document.getElementById('editUseragent').value = channel.useragent || '';
            document.getElementById('editExtvlcopt').value = (channel.extvlcopt || []).join('\n');
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        function saveChannel(event) {
            event.preventDefault();
            const index = parseInt(document.getElementById('editIndex').value);
            const channel = allChannels[index];

            channel.name = document.getElementById('editName').value.trim();
            channel.group = document.getElementById('editGroup').value.trim();
            channel.tvg_id = document.getElementById('editTvgId').value.trim();
            channel.tvg_name = document.getElementById('editTvgName').value.trim();
            channel.logo = document.getElementById('editLogo').value.trim();
            channel.tvg_rec = document.getElementById('editTvgRec').value.trim();
            channel.catchup = document.getElementById('editCatchup').value.trim();
            channel.catchup_days = document.getElementById('editCatchupDays').value.trim();
            channel.catchup_source = document.getElementById('editCatchupSource').value.trim();
            channel.audio_track = document.getElementById('editAudioTrack').value.trim();
            channel.useragent = document.getElementById('editUseragent').value.trim();

            const extvlcoptText = document.getElementById('editExtvlcopt').value;
            channel.extvlcopt = extvlcoptText.split('\n').map(l => l.trim()).filter(l => l);

            // Очищаем пустые значения и "0"
            for (const key of ['tvg_id', 'tvg_name', 'logo', 'tvg_rec', 'catchup', 'catchup_days', 'catchup_source', 'audio_track', 'useragent']) {
                if (!channel[key] || channel[key] === '0') {
                    channel[key] = '';
                }
            }

            allChannels[index] = channel;
            setCurrentContent(generateM3U(allChannels));
            
            closeEditModal();
            renderChannels();
        }

        function deleteChannel(index) {
            if (!confirm('Удалить канал "' + allChannels[index].name + '"?')) return;

            allChannels.splice(index, 1);
            setCurrentContent(generateM3U(allChannels));
            renderChannels();
        }

        function moveChannel(index, targetFile) {
            const channel = allChannels[index];
            
            if (!confirm(`Переместить канал "${channel.name}" в ${targetFile}?`)) return;

            allChannels.splice(index, 1);
            setCurrentContent(generateM3U(allChannels));

            let targetContent = playlists[targetFile] || '#EXTM3U\n';
            let targetChannels = parseM3U(targetContent);
            targetChannels.push(channel);
            targetChannels = sortChannels(targetChannels);

            playlists[targetFile] = generateM3U(targetChannels);
            savePlaylists();

            renderChannels();
            updatePlaylistsList();
        }

        function showCreatePlaylistModal() {
            document.getElementById('createPlaylistModal').classList.add('show');
        }

        function closeCreatePlaylistModal() {
            document.getElementById('createPlaylistModal').classList.remove('show');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('show');
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeVideoModal();
                closeEditModal();
                closeCreatePlaylistModal();
            }
        });

        // Инициализация при загрузке
        loadPlaylists();
        updatePlaylistSelector();
        updatePlaylistsList();
        renderChannels();
    </script>
</body>
</html>
